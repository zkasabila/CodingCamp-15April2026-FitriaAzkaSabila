<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-light">

  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle">🌙 Dark Mode</button>
  </header>

  <!-- 1. Balance -->
  <section id="balance-section">
    <p>Total Balance</p>
    <span id="balance-display">$0.00</span>
  </section>

  <!-- 2. Transaction Form -->
  <section id="form-section">
    <h2 class="card-title">Add Transaction</h2>
    <form id="transaction-form">
      <div class="field-group">
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" placeholder="e.g. Coffee" />
        <span id="err-name" class="error"></span>
      </div>

      <div class="field-group">
        <label for="item-amount">Amount</label>
        <input type="number" id="item-amount" placeholder="0.00" min="0.01" step="0.01" />
        <span id="err-amount" class="error"></span>
      </div>

      <div class="field-group">
        <label for="item-category">Category</label>
        <select id="item-category">
          <option value="">-- Select Category --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
          <!-- custom categories injected here -->
        </select>
        <span id="err-category" class="error"></span>
      </div>

      <button type="submit">Add Transaction</button>
    </form>

    <!-- Custom Category Sub-form -->
    <div id="custom-category-form">
      <input type="text" id="new-category-name" placeholder="New category name" />
      <span id="err-custom-cat" class="error"></span>
      <button id="add-category-btn">Add Category</button>
    </div>
  </section>

  <!-- Dashboard: List (left) + Chart (right) -->
  <div id="dashboard">

    <!-- Transactions List -->
    <section id="list-section">
      <h2 class="card-title">Transactions</h2>
      <div id="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="none">Default</option>
          <option value="amount-desc">Amount High → Low</option>
          <option value="amount-asc">Amount Low → High</option>
          <option value="category">Category (A–Z)</option>
        </select>
      </div>
      <ul id="transaction-list"></ul>
      <p id="list-empty-msg" hidden>No transactions recorded.</p>
    </section>

    <!-- Spending Chart -->
    <section id="chart-section">
      <h2 class="card-title">Spending by Category</h2>
      <div id="chart-container">
        <canvas id="spending-chart"></canvas>
      </div>
      <p id="chart-empty-msg" hidden>No transactions yet.</p>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
